name: Daily Sprint Status to Teams

on:
  schedule:
    # 5pm SAST (UTC+2) = 15:00 UTC, Monday to Friday
    - cron: '0 15 * * 1-5'
  workflow_dispatch:

jobs:
  post-status:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read

    steps:
      - name: Query Client Delivery Tracker
        env:
          GH_TOKEN: ${{ secrets.PROJECT_READ_TOKEN }}
        run: |
          node << 'EOF'
          const fs = require('fs');
          const { execFileSync } = require('child_process');

          let allItems = [];
          let cursor = null;

          do {
            const after = cursor ? `, after: "${cursor}"` : '';

            const query = `
              query {
                organization(login: "RedEmberTech") {
                  projectV2(number: 8) {
                    title
                    items(first: 100${after}) {
                      pageInfo {
                        hasNextPage
                        endCursor
                      }
                      nodes {
                        fieldValueByName(name: "Status") {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            name
                          }
                        }
                        sprint: fieldValueByName(name: "Sprint") {
                          ... on ProjectV2ItemFieldIterationValue {
                            title
                            startDate
                            duration
                          }
                        }
                        priority: fieldValueByName(name: "Priority") {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            name
                          }
                        }
                        client: fieldValueByName(name: "Client") {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            name
                          }
                        }
                        content {
                          ... on Issue {
                            title
                            number
                            url
                            assignees(first: 20) {
                              nodes {
                                login
                              }
                            }
                          }
                          ... on DraftIssue {
                            title
                            assignees(first: 20) {
                              nodes {
                                login
                              }
                            }
                          }
                          ... on PullRequest {
                            title
                            number
                            url
                            assignees(first: 20) {
                              nodes {
                                login
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const result = JSON.parse(execFileSync('gh', ['api', 'graphql', '-f', `query=${query}`], {
              encoding: 'utf8',
              maxBuffer: 1024 * 1024 * 20
            }));

            const project = result.data.organization.projectV2;
            allItems.push(...project.items.nodes);
            cursor = project.items.pageInfo.hasNextPage ? project.items.pageInfo.endCursor : null;
          } while (cursor);

          console.log(`Total project items fetched: ${allItems.length}`);
          fs.writeFileSync('/tmp/project_data.json', JSON.stringify({ items: allItems }, null, 2));
          EOF

      - name: Format and Post to Teams
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          node << 'EOF'
          const fs = require('fs');
          const https = require('https');
          const { URL } = require('url');

          const raw = JSON.parse(fs.readFileSync('/tmp/project_data.json', 'utf8'));
          const items = raw.items || [];

          const excludedStatuses = ['Backlog'];
          const maxItemsPerCard = 16;
          const today = new Date().toISOString().split('T')[0];

          const statusEmoji = {
            'Done': '✅',
            'In Progress': '🔄',
            'UAT': '🧪',
            'PROD': '🚀',
            'Todo': '📥',
            'On Hold': '⏸️',
            'Blocked': '🔴',
            'Backlog': '📋',
            'In Review': '🔍',
            'No Status': '⚪'
          };

          const statusOrder = [
            'Blocked',
            'In Progress',
            'In Review',
            'UAT',
            'PROD',
            'Todo',
            'On Hold',
            'Done',
            'No Status'
          ];

          const isCurrentSprint = item => {
            const sprint = item.sprint;
            if (!sprint?.startDate) return false;

            const sprintEnd = new Date(sprint.startDate);
            sprintEnd.setDate(sprintEnd.getDate() + (sprint.duration || 14));

            return sprint.startDate <= today &&
              sprintEnd.toISOString().split('T')[0] >= today;
          };

          const cleanName = value =>
            (value || '')
              .replace(/-RedEmber|-hub/gi, '')
              .replace(/[._-]/g, ' ')
              .trim();

          const reportItems = items.filter(item => {
            if (!item.content) return false;

            const status = item.fieldValueByName?.name || 'No Status';

            return isCurrentSprint(item) && !excludedStatuses.includes(status);
          });

          const currentSprintItem = reportItems.find(item => item.sprint) || items.find(isCurrentSprint);
          const currentSprintTitle = currentSprintItem?.sprint?.title || 'Current Sprint';
          const sprintStart = currentSprintItem?.sprint?.startDate || '';
          const sprintDuration = currentSprintItem?.sprint?.duration || 14;
          const sprintEnd = sprintStart
            ? new Date(new Date(sprintStart).getTime() + sprintDuration * 86400000).toISOString().split('T')[0]
            : '';

          const date = new Date().toLocaleDateString('en-ZA', {
            weekday: 'long',
            year: 'numeric',
            month: 'long',
            day: 'numeric',
            timeZone: 'Africa/Johannesburg'
          });

          const statusCounts = {};
          reportItems.forEach(item => {
            const status = item.fieldValueByName?.name || 'No Status';
            statusCounts[status] = (statusCounts[status] || 0) + 1;
          });

          const orderedStatuses = [
            ...statusOrder.filter(status => statusCounts[status]),
            ...Object.keys(statusCounts).filter(status => !statusOrder.includes(status))
          ];

          console.log(`Current sprint items excluding Backlog: ${reportItems.length}`);
          console.log('Status breakdown:');
          orderedStatuses.forEach(status => console.log(`- ${status}: ${statusCounts[status]}`));

          const itemsByStatus = {};
          reportItems.forEach(item => {
            const status = item.fieldValueByName?.name || 'No Status';
            const client = item.client?.name || 'Internal';
            const title = item.content?.title || 'Untitled';
            const priority = item.priority?.name || '';
            const assignees = (item.content?.assignees?.nodes || []).map(a => a.login);

            if (!itemsByStatus[status]) itemsByStatus[status] = [];
            itemsByStatus[status].push({ status, client, title, priority, assignees });
          });

          Object.values(itemsByStatus).forEach(statusItems => {
            statusItems.sort((a, b) => {
              const clientCompare = a.client.localeCompare(b.client);
              if (clientCompare !== 0) return clientCompare;
              return a.title.localeCompare(b.title);
            });
          });

          function chunkArray(array, size) {
            const chunks = [];
            for (let i = 0; i < array.length; i += size) {
              chunks.push(array.slice(i, i + size));
            }
            return chunks;
          }

          function buildSummaryCardBody() {
            const summaryParts = orderedStatuses
              .map(status => `${statusEmoji[status] || '•'} **${statusCounts[status]}** ${status}`)
              .join('   ');

            return [
              {
                type: "TextBlock",
                text: `📋 Client Delivery Tracker — ${currentSprintTitle}`,
                weight: "Bolder",
                size: "Large",
                wrap: true
              },
              {
                type: "TextBlock",
                text: sprintStart
                  ? `${date}  •  ${sprintStart} → ${sprintEnd}  •  ${reportItems.length} items excluding Backlog`
                  : `${date}  •  ${reportItems.length} items excluding Backlog`,
                spacing: "Small",
                isSubtle: true,
                wrap: true
              },
              {
                type: "TextBlock",
                text: summaryParts || 'No current sprint items found outside Backlog.',
                wrap: true,
                separator: true,
                spacing: "Medium"
              }
            ];
          }

          function buildStatusCardBody(status, chunkItems, cardNumber, totalCards) {
            const grouped = {};

            chunkItems.forEach(item => {
              if (!grouped[item.client]) grouped[item.client] = [];
              grouped[item.client].push(item);
            });

            const body = [
              {
                type: "TextBlock",
                text: `${statusEmoji[status] || '•'} ${status} — ${currentSprintTitle}`,
                weight: "Bolder",
                size: "Large",
                wrap: true
              },
              {
                type: "TextBlock",
                text: `${date}  •  ${statusCounts[status]} ${status} item(s)  •  Card ${cardNumber}/${totalCards}`,
                spacing: "Small",
                isSubtle: true,
                wrap: true
              }
            ];

            Object.entries(grouped).forEach(([client, clientItems]) => {
              body.push({
                type: "TextBlock",
                text: `**${client}**`,
                weight: "Bolder",
                size: "Medium",
                color: "Accent",
                separator: true,
                spacing: "Medium",
                wrap: true
              });

              clientItems.forEach(item => {
                const who = item.assignees.length > 0
                  ? item.assignees.map(cleanName).join(', ')
                  : 'Unassigned';

                const priorityTag = item.priority.includes('P1')
                  ? ' 🔴'
                  : item.priority.includes('P2')
                    ? ' 🟡'
                    : '';

                body.push({
                  type: "TextBlock",
                  text: `• ${item.title.replace(/^[^\w\s]+/, '').trim()}${priorityTag} — ${who}`,
                  size: "Small",
                  wrap: true,
                  spacing: "Small"
                });
              });
            });

            return body;
          }

          function createPayload(body) {
            return JSON.stringify({
              type: "message",
              attachments: [{
                contentType: "application/vnd.microsoft.card.adaptive",
                contentUrl: null,
                content: {
                  "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  type: "AdaptiveCard",
                  version: "1.4",
                  body
                }
              }]
            });
          }

          function postToTeams(payload, label) {
            return new Promise((resolve, reject) => {
              const webhookUrl = new URL(process.env.TEAMS_WEBHOOK_URL);

              const options = {
                hostname: webhookUrl.hostname,
                port: webhookUrl.port || 443,
                path: webhookUrl.pathname + webhookUrl.search,
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Content-Length': Buffer.byteLength(payload)
                }
              };

              const req = https.request(options, (res) => {
                let body = '';

                res.on('data', chunk => body += chunk);

                res.on('end', () => {
                  console.log(`${label} Teams status: ${res.statusCode}`);
                  console.log(`${label} Teams response: ${body || '(empty)'}`);

                  if (res.statusCode >= 200 && res.statusCode < 300) {
                    resolve();
                  } else {
                    reject(new Error(`Teams responded ${res.statusCode}: ${body}`));
                  }
                });
              });

              req.on('error', reject);
              req.write(payload);
              req.end();
            });
          }

          async function main() {
            await postToTeams(createPayload(buildSummaryCardBody()), 'Summary card');
            console.log('✅ Posted summary card to Teams');

            for (const status of orderedStatuses) {
              const statusItems = itemsByStatus[status] || [];
              const chunks = chunkArray(statusItems, maxItemsPerCard);

              for (let index = 0; index < chunks.length; index++) {
                const body = buildStatusCardBody(status, chunks[index], index + 1, chunks.length);
                await postToTeams(createPayload(body), `${status} card ${index + 1}/${chunks.length}`);
                console.log(`✅ Posted ${status} card ${index + 1}/${chunks.length} to Teams`);
              }
            }
          }

          main().catch(error => {
            console.error(`❌ ${error.message}`);
            process.exit(1);
          });
          EOF
