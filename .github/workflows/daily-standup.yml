name: Daily Sprint Status to Teams

on:
  schedule:
    # 5pm SAST (UTC+2) = 15:00 UTC, Monday to Friday
    - cron: '0 15 * * 1-5'
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  post-status:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read

    steps:
      - name: Query Client Delivery Tracker
        env:
          GH_TOKEN: ${{ secrets.PROJECT_READ_TOKEN }}
        run: |
          node << 'EOF'
          const fs = require('fs');
          const { execFileSync } = require('child_process');

          const pageQuery = (cursor) => `
            query {
              organization(login: "RedEmberTech") {
                projectV2(number: 8) {
                  title
                  items(first: 100${cursor ? `, after: \"${cursor}\"` : ''}) {
                    pageInfo {
                      hasNextPage
                      endCursor
                    }
                    nodes {
                      fieldValueByName(name: "Status") {
                        ... on ProjectV2ItemFieldSingleSelectValue {
                          name
                        }
                      }
                      sprint: fieldValueByName(name: "Sprint") {
                        ... on ProjectV2ItemFieldIterationValue {
                          title
                          startDate
                          duration
                        }
                      }
                      priority: fieldValueByName(name: "Priority") {
                        ... on ProjectV2ItemFieldSingleSelectValue {
                          name
                        }
                      }
                      client: fieldValueByName(name: "Client") {
                        ... on ProjectV2ItemFieldSingleSelectValue {
                          name
                        }
                      }
                      content {
                        ... on Issue {
                          title
                          number
                          url
                          assignees(first: 20) {
                            nodes {
                              login
                            }
                          }
                        }
                        ... on DraftIssue {
                          title
                          assignees(first: 20) {
                            nodes {
                              login
                            }
                          }
                        }
                        ... on PullRequest {
                          title
                          number
                          url
                          assignees(first: 20) {
                            nodes {
                              login
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          `;

          let allItems = [];
          let cursor = null;
          let hasNextPage = true;
          let projectTitle = '';

          while (hasNextPage) {
            const query = pageQuery(cursor);
            const result = JSON.parse(execFileSync('gh', ['api', 'graphql', '-f', `query=${query}`], {
              encoding: 'utf8',
              maxBuffer: 1024 * 1024 * 20
            }));

            if (result.errors?.length) {
              console.error(JSON.stringify(result.errors, null, 2));
              process.exit(1);
            }

            const project = result.data.organization.projectV2;
            projectTitle = project.title;
            allItems.push(...project.items.nodes);

            hasNextPage = project.items.pageInfo.hasNextPage;
            cursor = project.items.pageInfo.endCursor;
          }

          console.log(`Fetched ${allItems.length} project items from ${projectTitle}`);
          fs.writeFileSync('/tmp/project_data.json', JSON.stringify({ projectTitle, items: allItems }, null, 2));
          EOF

      - name: Format and Post to Teams
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          node << 'EOF'
          const fs = require('fs');
          const https = require('https');
          const { URL } = require('url');

          const raw = JSON.parse(fs.readFileSync('/tmp/project_data.json', 'utf8'));
          const items = raw.items || [];

          const activeStatuses = [
            'Todo',
            'In Progress',
            'In Review',
            'UAT',
            'PROD',
            'Blocked',
            'On Hold',
            'No Status'
          ];

          const statusEmoji = {
            'Done': '✅',
            'In Progress': '🔄',
            'UAT': '🧪',
            'PROD': '🚀',
            'Todo': '📥',
            'On Hold': '⏸️',
            'Blocked': '🔴',
            'Backlog': '📋',
            'In Review': '🔍',
            'No Status': '⚪'
          };

          const today = new Date().toLocaleDateString('en-CA', {
            timeZone: 'Africa/Johannesburg'
          });

          const isCurrentSprint = (item) => {
            const sprint = item.sprint;
            if (!sprint?.startDate) return false;

            const sprintStart = sprint.startDate;
            const sprintEndDate = new Date(`${sprint.startDate}T00:00:00Z`);
            sprintEndDate.setUTCDate(sprintEndDate.getUTCDate() + (sprint.duration || 14));
            const sprintEnd = sprintEndDate.toISOString().split('T')[0];

            return sprintStart <= today && sprintEnd >= today;
          };

          const getStatus = (item) => item.fieldValueByName?.name || 'No Status';

          const reportItems = items.filter(item => {
            if (!item.content) return false;

            const status = getStatus(item);
            if (!activeStatuses.includes(status)) return false;

            return isCurrentSprint(item);
          }).slice(0, 10);

          console.log(`Total project items fetched: ${items.length}`);
          console.log(`Current sprint active items: ${reportItems.length}`);
          console.log('Included items:');
          reportItems.forEach(item => {
            console.log(`- [${getStatus(item)}] ${item.sprint?.title || 'No Sprint'} :: ${item.content?.title || 'Untitled'}`);
          });

          const currentSprintItem = reportItems.find(item => item.sprint) || items.find(isCurrentSprint);
          const currentSprintTitle = currentSprintItem?.sprint?.title || 'Current Sprint';
          const sprintStart = currentSprintItem?.sprint?.startDate || '';
          const sprintDuration = currentSprintItem?.sprint?.duration || 14;
          const sprintEnd = sprintStart
            ? (() => {
                const end = new Date(`${sprintStart}T00:00:00Z`);
                end.setUTCDate(end.getUTCDate() + sprintDuration);
                return end.toISOString().split('T')[0];
              })()
            : '';

          const displayDate = new Date().toLocaleDateString('en-ZA', {
            weekday: 'long',
            year: 'numeric',
            month: 'long',
            day: 'numeric',
            timeZone: 'Africa/Johannesburg'
          });

          const clientGroups = {};
          const assigneeLoad = {};

          reportItems.forEach(item => {
            const status = getStatus(item);
            const title = item.content?.title || 'Untitled';
            const priority = item.priority?.name || '';
            const client = item.client?.name || 'Internal';
            const assignees = (item.content?.assignees?.nodes || []).map(a => a.login);

            if (!clientGroups[client]) clientGroups[client] = [];
            clientGroups[client].push({ title, status, priority, assignees });

            assignees.forEach(a => {
              if (!assigneeLoad[a]) assigneeLoad[a] = { total: 0, statuses: {} };
              assigneeLoad[a].total++;
              assigneeLoad[a].statuses[status] = (assigneeLoad[a].statuses[status] || 0) + 1;
            });
          });

          const clientOrder = Object.entries(clientGroups).sort((a, b) => b[1].length - a[1].length);

          const statusCounts = {};
          reportItems.forEach(item => {
            const status = getStatus(item);
            statusCounts[status] = (statusCounts[status] || 0) + 1;
          });

          const statusOrder = ['In Progress', 'Blocked', 'UAT', 'PROD', 'In Review', 'Todo', 'On Hold', 'No Status'];
          const summaryParts = statusOrder
            .filter(status => statusCounts[status])
            .map(status => `${statusEmoji[status] || '•'} **${statusCounts[status]}** ${status}`)
            .join('   ');

          const cardBody = [];

          cardBody.push({
            type: 'TextBlock',
            text: `📋 Client Delivery Tracker — ${currentSprintTitle}`,
            weight: 'Bolder',
            size: 'Large',
            wrap: true
          });

          cardBody.push({
            type: 'TextBlock',
            text: sprintStart
              ? `${displayDate}  •  ${sprintStart} → ${sprintEnd}  •  ${reportItems.length} active sprint items`
              : `${displayDate}  •  ${reportItems.length} active sprint items`,
            spacing: 'Small',
            isSubtle: true,
            wrap: true
          });

          cardBody.push({
            type: 'TextBlock',
            text: summaryParts || 'No active work found in the current sprint.',
            wrap: true,
            separator: true,
            spacing: 'Medium'
          });

          clientOrder.forEach(([client, clientItems]) => {
            cardBody.push({
              type: 'TextBlock',
              text: `**${client}**`,
              weight: 'Bolder',
              size: 'Medium',
              color: 'Accent',
              separator: true,
              spacing: 'Medium',
              wrap: true
            });

            cardBody.push({
              type: 'ColumnSet',
              spacing: 'Small',
              columns: [
                {
                  type: 'Column',
                  width: 'stretch',
                  items: [{ type: 'TextBlock', text: 'Task', weight: 'Bolder', size: 'Small', isSubtle: true }]
                },
                {
                  type: 'Column',
                  width: '100px',
                  items: [{ type: 'TextBlock', text: 'Status', weight: 'Bolder', size: 'Small', isSubtle: true }]
                },
                {
                  type: 'Column',
                  width: '120px',
                  items: [{ type: 'TextBlock', text: 'Who', weight: 'Bolder', size: 'Small', isSubtle: true }]
                }
              ]
            });

            clientItems.forEach(item => {
              const emoji = statusEmoji[item.status] || '•';
              const who = item.assignees.length > 0
                ? item.assignees.map(a => a.replace(/-RedEmber|-hub/gi, '')).join(', ')
                : 'Unassigned';

              const priorityTag = item.priority.includes('P1')
                ? ' 🔴'
                : item.priority.includes('P2')
                  ? ' 🟡'
                  : '';

              cardBody.push({
                type: 'ColumnSet',
                spacing: 'Small',
                columns: [
                  {
                    type: 'Column',
                    width: 'stretch',
                    items: [{
                      type: 'TextBlock',
                      text: item.title.replace(/^[^\w\s]+/, '').trim() + priorityTag,
                      size: 'Small',
                      wrap: true
                    }]
                  },
                  {
                    type: 'Column',
                    width: '100px',
                    items: [{
                      type: 'TextBlock',
                      text: `${emoji} ${item.status}`,
                      size: 'Small',
                      wrap: true
                    }]
                  },
                  {
                    type: 'Column',
                    width: '120px',
                    items: [{
                      type: 'TextBlock',
                      text: who,
                      size: 'Small',
                      isSubtle: true,
                      wrap: true
                    }]
                  }
                ]
              });
            });
          });

          cardBody.push({
            type: 'TextBlock',
            text: '👥 Team Load',
            weight: 'Bolder',
            size: 'Medium',
            separator: true,
            spacing: 'Medium'
          });

          const teamFacts = Object.entries(assigneeLoad)
            .sort((a, b) => b[1].total - a[1].total)
            .map(([name, data]) => {
              const shortName = name.replace(/-RedEmber|-hub/gi, '');
              const breakdown = Object.entries(data.statuses)
                .map(([status, count]) => `${statusEmoji[status] || ''} ${count} ${status}`)
                .join('  ');

              return {
                title: shortName,
                value: `${data.total} items — ${breakdown}`
              };
            });

          cardBody.push({
            type: 'FactSet',
            facts: teamFacts.length > 0
              ? teamFacts
              : [{ title: 'No assignees', value: 'No active assigned work found in the current sprint.' }],
            spacing: 'Small'
          });

          const critical = reportItems.filter(item =>
            (item.priority?.name || '').includes('P1') && getStatus(item) !== 'Done'
          );
          const blocked = reportItems.filter(item => getStatus(item) === 'Blocked');
          const onHold = reportItems.filter(item => getStatus(item) === 'On Hold');

          if (critical.length || blocked.length || onHold.length) {
            const warnings = [
              critical.length && `🔴 ${critical.length}x P1 Critical still active`,
              blocked.length && `🚫 ${blocked.length} Blocked — needs unblocking`,
              onHold.length && `⏸️ ${onHold.length} On Hold — needs decisions`
            ].filter(Boolean).join('   ');

            cardBody.push({
              type: 'Container',
              style: 'attention',
              separator: true,
              spacing: 'Medium',
              items: [{
                type: 'TextBlock',
                text: `⚠️  ${warnings}`,
                wrap: true,
                size: 'Small'
              }]
            });
          }

          const payload = JSON.stringify({
            type: 'message',
            attachments: [{
              contentType: 'application/vnd.microsoft.card.adaptive',
              contentUrl: null,
              content: {
                '$schema': 'http://adaptivecards.io/schemas/adaptive-card.json',
                type: 'AdaptiveCard',
                version: '1.4',
                body: cardBody
              }
            }]
          });

          const webhookUrl = new URL(process.env.TEAMS_WEBHOOK_URL);
          const options = {
            hostname: webhookUrl.hostname,
            port: webhookUrl.port || 443,
            path: webhookUrl.pathname + webhookUrl.search,
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Content-Length': Buffer.byteLength(payload)
            }
          };

          const req = https.request(options, (res) => {
            let body = '';
            res.on('data', chunk => body += chunk);
            res.on('end', () => {
              if (res.statusCode >= 200 && res.statusCode < 300) {
                console.log('✅ Posted to Teams');
              } else {
                console.error(`❌ Teams responded ${res.statusCode}: ${body}`);
                process.exit(1);
              }
            });
          });

          req.on('error', e => {
            console.error(`❌ ${e.message}`);
            process.exit(1);
          });

          req.write(payload);
          req.end();
          EOF
