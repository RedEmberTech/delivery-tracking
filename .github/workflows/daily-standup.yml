name: Daily Sprint Status to Teams

on:
  schedule:
    # 5pm SAST (UTC+2) = 15:00 UTC, Monday to Friday
    - cron: '0 15 * * 1-5'
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  post-status:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read

    steps:
      - name: Query Client Delivery Tracker
        id: query
        env:
          GH_TOKEN: ${{ secrets.PROJECT_READ_TOKEN }}
        run: |
          # Get the current active sprint iteration and all items from Project #8
          RESULT=$(gh api graphql -f query='
            query {
              organization(login: "RedEmberTech") {
                projectV2(number: 8) {
                  title
                  items(first: 100) {
                    nodes {
                      fieldValueByName(name: "Status") {
                        ... on ProjectV2ItemFieldSingleSelectValue {
                          name
                        }
                      }
                      sprint: fieldValueByName(name: "Sprint") {
                        ... on ProjectV2ItemFieldIterationValue {
                          title
                          startDate
                          duration
                        }
                      }
                      priority: fieldValueByName(name: "Priority") {
                        ... on ProjectV2ItemFieldSingleSelectValue {
                          name
                        }
                      }
                      client: fieldValueByName(name: "Client") {
                        ... on ProjectV2ItemFieldSingleSelectValue {
                          name
                        }
                      }
                      content {
                        ... on Issue {
                          title
                          number
                          url
                          assignees(first: 5) {
                            nodes {
                              login
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            }
          ')
          echo "$RESULT" > /tmp/project_data.json

      - name: Format and Post to Teams
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          node << 'EOF'
          const fs = require('fs');
          const https = require('https');
          const { URL } = require('url');

          const raw = JSON.parse(fs.readFileSync('/tmp/project_data.json', 'utf8'));
          const items = raw.data.organization.projectV2.items.nodes;

          // ─── Helpers ───

          const today = new Date().toISOString().split('T')[0];
          const sprintItems = items.filter(item => {
            const sprint = item.sprint;
            if (!sprint) return false;
            const start = sprint.startDate;
            const end = new Date(start);
            end.setDate(end.getDate() + (sprint.duration || 14));
            return start <= today && end.toISOString().split('T')[0] >= today;
          });

          const currentSprintTitle = sprintItems[0]?.sprint.title || 'Current Sprint';
          const sprintStart = sprintItems[0]?.sprint.startDate || '';
          const sprintDuration = sprintItems[0]?.sprint.duration || 14;
          const sprintEnd = sprintStart
            ? new Date(new Date(sprintStart).getTime() + sprintDuration * 86400000).toISOString().split('T')[0]
            : '';

          const date = new Date().toLocaleDateString('en-ZA', {
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
            timeZone: 'Africa/Johannesburg'
          });

          const statusEmoji = {
            'Done': '✅', 'In Progress': '🔄', 'UAT': '🧪', 'PROD': '🚀',
            'Todo': '📥', 'On Hold': '⏸️', 'Blocked': '🔴', 'Backlog': '📋', 'In Review': '🔍'
          };

          // ─── Group by Client ───
          const clientGroups = {};
          const assigneeLoad = {};

          sprintItems.forEach(item => {
            const status  = item.fieldValueByName?.name || 'No Status';
            const title   = item.content?.title || 'Untitled';
            const priority = item.priority?.name || '';
            const client  = item.client?.name || 'Internal';
            const assignees = (item.content?.assignees?.nodes || []).map(a => a.login);

            if (!clientGroups[client]) clientGroups[client] = [];
            clientGroups[client].push({ title, status, priority, assignees });

            assignees.forEach(a => {
              if (!assigneeLoad[a]) assigneeLoad[a] = { total: 0, statuses: {} };
              assigneeLoad[a].total++;
              assigneeLoad[a].statuses[status] = (assigneeLoad[a].statuses[status] || 0) + 1;
            });
          });

          // Sort clients — most active first
          const clientOrder = Object.entries(clientGroups).sort((a, b) => {
            const score = items => items.filter(i => !['Done','Backlog'].includes(i.status)).length;
            return score(b[1]) - score(a[1]);
          });

          // ─── Status summary counts ───
          const statusCounts = {};
          sprintItems.forEach(i => {
            const s = i.fieldValueByName?.name || 'No Status';
            statusCounts[s] = (statusCounts[s] || 0) + 1;
          });

          const statusOrder = ['In Progress','Blocked','UAT','PROD','In Review','Todo','On Hold','Backlog','Done'];
          const summaryParts = statusOrder
            .filter(s => statusCounts[s])
            .map(s => `${statusEmoji[s]} **${statusCounts[s]}** ${s}`)
            .join('   ');

          // ─── Build Card Body ───
          const cardBody = [];

          // Title
          cardBody.push({
            type: "TextBlock",
            text: `📋 Client Delivery Tracker — ${currentSprintTitle}`,
            weight: "Bolder",
            size: "Large",
            wrap: true
          });

          cardBody.push({
            type: "TextBlock",
            text: `${date}  •  ${sprintStart} → ${sprintEnd}  •  ${sprintItems.length} items`,
            spacing: "Small",
            isSubtle: true,
            wrap: true
          });

          // Status summary bar
          cardBody.push({
            type: "TextBlock",
            text: summaryParts,
            wrap: true,
            separator: true,
            spacing: "Medium"
          });

          // ─── Per-Client Table ───
          clientOrder.forEach(([client, clientItems]) => {
            // Client name as bold header
            cardBody.push({
              type: "TextBlock",
              text: `**${client}**`,
              weight: "Bolder",
              size: "Medium",
              color: "Accent",
              separator: true,
              spacing: "Medium",
              wrap: true
            });

            // Column header row
            cardBody.push({
              type: "ColumnSet",
              spacing: "Small",
              columns: [
                { type: "Column", width: "stretch",
                  items: [{ type: "TextBlock", text: "Task", weight: "Bolder", size: "Small", isSubtle: true }]
                },
                { type: "Column", width: "100px",
                  items: [{ type: "TextBlock", text: "Status", weight: "Bolder", size: "Small", isSubtle: true }]
                },
                { type: "Column", width: "120px",
                  items: [{ type: "TextBlock", text: "Who", weight: "Bolder", size: "Small", isSubtle: true }]
                }
              ]
            });

            // One row per task
            clientItems.forEach(item => {
              const emoji = statusEmoji[item.status] || '•';
              const who = item.assignees.length > 0
                ? item.assignees.map(a => a.replace(/-RedEmber|-hub/gi, '')).join(', ')
                : 'Unassigned';
              const priorityTag = item.priority.includes('P1') ? ' 🔴' : item.priority.includes('P2') ? ' 🟡' : '';

              cardBody.push({
                type: "ColumnSet",
                spacing: "Small",
                columns: [
                  {
                    type: "Column",
                    width: "stretch",
                    items: [{
                      type: "TextBlock",
                      text: item.title.replace(/^[^\w\s]+/, '').trim() + priorityTag,
                      size: "Small",
                      wrap: true
                    }]
                  },
                  {
                    type: "Column",
                    width: "100px",
                    items: [{
                      type: "TextBlock",
                      text: `${emoji} ${item.status}`,
                      size: "Small",
                      wrap: true
                    }]
                  },
                  {
                    type: "Column",
                    width: "120px",
                    items: [{
                      type: "TextBlock",
                      text: who,
                      size: "Small",
                      isSubtle: true,
                      wrap: true
                    }]
                  }
                ]
              });
            });
          });

          // ─── Team Load ───
          cardBody.push({
            type: "TextBlock",
            text: "👥 Team Load",
            weight: "Bolder",
            size: "Medium",
            separator: true,
            spacing: "Medium"
          });

          const teamFacts = Object.entries(assigneeLoad)
            .sort((a, b) => b[1].total - a[1].total)
            .map(([name, data]) => {
              const shortName = name.replace(/-RedEmber|-hub/gi, '');
              const breakdown = Object.entries(data.statuses)
                .map(([s, c]) => `${statusEmoji[s] || ''} ${c} ${s}`).join('  ');
              return { title: shortName, value: `${data.total} items — ${breakdown}` };
            });

          cardBody.push({ type: "FactSet", facts: teamFacts, spacing: "Small" });

          // ─── Attention Banner ───
          const critical = sprintItems.filter(i =>
            (i.priority?.name || '').includes('P1') && i.fieldValueByName?.name !== 'Done'
          );
          const blocked = sprintItems.filter(i => i.fieldValueByName?.name === 'Blocked');
          const onHold  = sprintItems.filter(i => i.fieldValueByName?.name === 'On Hold');

          if (critical.length || blocked.length || onHold.length) {
            const warnings = [
              critical.length && `🔴 ${critical.length}x P1 Critical still active`,
              blocked.length  && `🚫 ${blocked.length} Blocked — needs unblocking`,
              onHold.length   && `⏸️ ${onHold.length} On Hold — needs decisions`
            ].filter(Boolean).join('   ');

            cardBody.push({
              type: "Container",
              style: "attention",
              separator: true,
              spacing: "Medium",
              items: [{ type: "TextBlock", text: `⚠️  ${warnings}`, wrap: true, size: "Small" }]
            });
          }

          // ─── Payload ───
          const payload = JSON.stringify({
            type: "message",
            attachments: [{
              contentType: "application/vnd.microsoft.card.adaptive",
              contentUrl: null,
              content: {
                "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                type: "AdaptiveCard",
                version: "1.4",
                body: cardBody
              }
            }]
          });

          // ─── Post to Teams Workflow ───
          const webhookUrl = new URL(process.env.TEAMS_WEBHOOK_URL);
          const options = {
            hostname: webhookUrl.hostname,
            port: webhookUrl.port || 443,
            path: webhookUrl.pathname + webhookUrl.search,
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Content-Length': Buffer.byteLength(payload)
            }
          };

          const req = https.request(options, (res) => {
            let body = '';
            res.on('data', chunk => body += chunk);
            res.on('end', () => {
              if (res.statusCode >= 200 && res.statusCode < 300) {
                console.log('✅ Posted to Teams');
              } else {
                console.error(`❌ Teams responded ${res.statusCode}: ${body}`);
                process.exit(1);
              }
            });
          });

          req.on('error', e => { console.error(`❌ ${e.message}`); process.exit(1); });
          req.write(payload);
          req.end();
          EOF
