name: Inherit Sprint from Parent Issue

on:
  issues:
    types: [opened, transferred]

jobs:
  inherit-fields:
    runs-on: ubuntu-latest
    steps:
      - name: Inherit fields from parent issue
        uses: actions/github-script@v7
        env:
          PROJECT_ID: "PVT_kwDOBxhV-M4BS2ZA"
          SPRINT_FIELD_ID: "PVTIF_lADOBxhV-M4BS2ZAzhARFEQ"
          STATUS_FIELD_ID: "PVTSSF_lADOBxhV-M4BS2ZAzhAQ4vg"
          CLIENT_FIELD_ID: "PVTSSF_lADOBxhV-M4BS2ZAzhAQ4z8"
          PRIORITY_FIELD_ID: "PVTSSF_lADOBxhV-M4BS2ZAzhAQ40o"
          WORK_TYPE_FIELD_ID: "PVTSSF_lADOBxhV-M4BS2ZAzhAQ45Y"
          EFFORT_FIELD_ID: "PVTSSF_lADOBxhV-M4BS2ZAzhARsoU"
          STATUS_TODO_ID: "efd7990c"
        with:
          github-token: ${{ secrets.PROJECT_PAT }}
          script: |
            const issue = context.payload.issue;
            const issueNodeId = issue.node_id;
            const projectId = process.env.PROJECT_ID;

            // --- Step 1: Check if this issue has a parent ---
            const parentQuery = `
              query($nodeId: ID!) {
                node(id: $nodeId) {
                  ... on Issue {
                    parent {
                      number
                      title
                      id
                    }
                  }
                }
              }
            `;

            const parentResult = await github.graphql(parentQuery, { nodeId: issueNodeId });
            const parent = parentResult.node?.parent;

            if (!parent) {
              console.log(`Issue #${issue.number} has no parent issue - skipping.`);
              return;
            }

            console.log(`Issue #${issue.number} is a sub-issue of #${parent.number} ("${parent.title}")`);

            // --- Step 2: Get parent's field values from the project ---
            const parentFieldsQuery = `
              query($parentId: ID!) {
                node(id: $parentId) {
                  ... on Issue {
                    projectItems(first: 10) {
                      nodes {
                        id
                        project { id }
                        sprintValue: fieldValueByName(name: "Sprint") {
                          ... on ProjectV2ItemFieldIterationValue {
                            iterationId
                            title
                          }
                        }
                        clientValue: fieldValueByName(name: "Client") {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            optionId
                            name
                          }
                        }
                        priorityValue: fieldValueByName(name: "Priority") {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            optionId
                            name
                          }
                        }
                        workTypeValue: fieldValueByName(name: "Work Type") {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            optionId
                            name
                          }
                        }
                        effortValue: fieldValueByName(name: "Effort") {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            optionId
                            name
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const parentFieldsResult = await github.graphql(parentFieldsQuery, { parentId: parent.id });
            const parentItem = parentFieldsResult.node?.projectItems?.nodes?.find(
              item => item.project?.id === projectId
            );

            if (!parentItem) {
              console.log(`Parent #${parent.number} is not in project ${projectId} - skipping.`);
              return;
            }

            console.log(`Found parent project item: ${parentItem.id}`);

            // --- Step 3: Add the sub-issue to the project ---
            const addMutation = `
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                  item { id }
                }
              }
            `;

            const addResult = await github.graphql(addMutation, { projectId, contentId: issueNodeId });
            const newItemId = addResult.addProjectV2ItemById.item.id;
            console.log(`Added issue #${issue.number} to project (item: ${newItemId})`);

            // --- Step 4: Copy fields from parent to sub-issue ---
            const updateField = async (fieldId, value, label) => {
              const mutation = `
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: ProjectV2FieldValue!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId, itemId: $itemId, fieldId: $fieldId, value: $value
                  }) {
                    projectV2Item { id }
                  }
                }
              `;
              await github.graphql(mutation, { projectId, itemId: newItemId, fieldId, value });
              console.log(`  ${label}`);
            };

            // Copy Sprint from parent
            if (parentItem.sprintValue?.iterationId) {
              await updateField(
                process.env.SPRINT_FIELD_ID,
                { iterationId: parentItem.sprintValue.iterationId },
                `Sprint: ${parentItem.sprintValue.title}`
              );
            }

            // Set Status to "Todo" (fresh start for sub-issues)
            await updateField(
              process.env.STATUS_FIELD_ID,
              { singleSelectOptionId: process.env.STATUS_TODO_ID },
              `Status: Todo`
            );

            // Copy Client from parent
            if (parentItem.clientValue?.optionId) {
              await updateField(
                process.env.CLIENT_FIELD_ID,
                { singleSelectOptionId: parentItem.clientValue.optionId },
                `Client: ${parentItem.clientValue.name}`
              );
            }

            // Copy Priority from parent
            if (parentItem.priorityValue?.optionId) {
              await updateField(
                process.env.PRIORITY_FIELD_ID,
                { singleSelectOptionId: parentItem.priorityValue.optionId },
                `Priority: ${parentItem.priorityValue.name}`
              );
            }

            // Copy Work Type from parent
            if (parentItem.workTypeValue?.optionId) {
              await updateField(
                process.env.WORK_TYPE_FIELD_ID,
                { singleSelectOptionId: parentItem.workTypeValue.optionId },
                `Work Type: ${parentItem.workTypeValue.name}`
              );
            }

            // Copy Effort from parent
            if (parentItem.effortValue?.optionId) {
              await updateField(
                process.env.EFFORT_FIELD_ID,
                { singleSelectOptionId: parentItem.effortValue.optionId },
                `Effort: ${parentItem.effortValue.name}`
              );
            }

            console.log(`\nDone! Sub-issue #${issue.number} inherited fields from parent #${parent.number}`);
